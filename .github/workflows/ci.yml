name: CI

on:
  push:
  pull_request:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install valgrind
        run: sudo apt-get update && sudo apt-get install -y valgrind

      - name: Configure
        run: cmake -S . -B build

      - name: Build
        run: cmake --build build

      - name: Run tests
        run: ./build/tests

      - name: Run tests under valgrind
        run: valgrind --error-exitcode=1 --leak-check=full ./build/tests

      - name: Configure with sanitizers
        run: cmake -S . -B build-sanitized -DENABLE_SANITIZERS=ON

      - name: Build with sanitizers
        run: cmake --build build-sanitized

      - name: Run tests under ASan/UBSan
        run: ./build-sanitized/tests

  pages:
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install doxygen and gcovr
        run: sudo apt-get update && sudo apt-get install -y doxygen graphviz gcovr

      - name: Configure with coverage
        run: cmake -S . -B build -DENABLE_COVERAGE=ON

      - name: Build
        run: cmake --build build

      - name: Generate coverage report
        run: cmake --build build --target coverage

      - name: Generate coverage badge data
        run: |
          gcovr --root . --filter src --exclude src/tests --json-summary -o /tmp/summary.json
          PERCENT=$(python3 -c "import json; print(round(json.load(open('/tmp/summary.json'))['line_percent']))")
          COLOR=$(python3 -c "p=$PERCENT; print('brightgreen' if p>=90 else 'green' if p>=75 else 'yellow' if p>=50 else 'red')")
          mkdir -p badges
          echo "{\"schemaVersion\":1,\"label\":\"coverage\",\"message\":\"${PERCENT}%\",\"color\":\"${COLOR}\"}" > badges/coverage.json

      - name: Generate Doxygen docs
        run: doxygen Doxyfile

      - name: Assemble site
        run: |
          mkdir -p site
          cp -r docs/html site/html
          cp -r build/coverage site/coverage
          cp -r badges site/badges

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
