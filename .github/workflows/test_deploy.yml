name: Test and Deploy Documentation

on:
  push:
  pull_request:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Install valgrind, perf and gcovr
        run: |
          sudo apt-get update
          sudo apt-get install -y valgrind linux-tools-common linux-tools-generic linux-tools-$(uname -r) gcovr || true

      - name: Configure
        run: cmake -S . -B build

      - name: Build
        run: cmake --build build

      - name: Run tests
        run: ./build/tests

      - name: Run tests under valgrind
        run: valgrind --error-exitcode=1 --leak-check=full ./build/tests

      - name: Configure with sanitizers
        run: cmake -S . -B build-sanitized -DENABLE_SANITIZERS=ON

      - name: Build with sanitizers
        run: cmake --build build-sanitized

      - name: Run tests under ASan/UBSan
        run: ./build-sanitized/tests

      - name: Run benchmark
        run: ./build/bench | tee bench_output.txt

      - name: Run benchmark under perf stat
        run: |
          sudo sysctl -w kernel.perf_event_paranoid=-1 || true
          perf stat ./build/bench || echo "perf stat unavailable on this runner, skipping"

      - name: Configure with coverage
        run: cmake -S . -B build-coverage -DENABLE_COVERAGE=ON

      - name: Build tests with coverage
        run: cmake --build build-coverage --target tests

      - name: Run tests to generate coverage data
        run: ./build-coverage/tests

      - name: Generate coverage summary table
        run: |
          gcovr --root . --filter src --exclude src/tests \
            --gcov-ignore-parse-errors negative_hits.warn \
            --markdown -o coverage_table.md -- build-coverage

      - name: Format benchmark as table
        run: |
          {
            echo "| Operation | n | Time (s) | Ops/s |"
            echo "|---|---|---|---|"
            awk 'NF{printf "| %s | %s | %s | %s |\n", $1, $2, $3, $5}' bench_output.txt \
              | sed -e 's/n=//' -e 's/(//'
          } > bench_table.md

      - name: Build coverage & benchmark report
        run: |
          {
            echo "## Coverage & Benchmark Report"
            echo ""
            echo "### Coverage"
            echo ""
            cat coverage_table.md
            echo ""
            echo "### Benchmark"
            echo ""
            cat bench_table.md
          } > pr_comment.md

      - name: Post or update PR comment
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: coverage-benchmark-report
          path: pr_comment.md

  pages:
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install doxygen and gcovr
        run: sudo apt-get update && sudo apt-get install -y doxygen graphviz gcovr

      - name: Configure with coverage
        run: cmake -S . -B build -DENABLE_COVERAGE=ON

      - name: Build
        run: cmake --build build

      - name: Generate coverage report
        run: cmake --build build --target coverage

      - name: Generate coverage badge data
        run: |
          gcovr --root . --filter src --exclude src/tests \
            --gcov-ignore-parse-errors negative_hits.warn \
            --json-summary -o /tmp/summary.json -- build
          PERCENT=$(python3 -c "import json; print(round(json.load(open('/tmp/summary.json'))['line_percent']))")
          COLOR=$(python3 -c "p=$PERCENT; print('brightgreen' if p>=90 else 'green' if p>=75 else 'yellow' if p>=50 else 'red')")
          mkdir -p badges
          echo "{\"schemaVersion\":1,\"label\":\"coverage\",\"message\":\"${PERCENT}%\",\"color\":\"${COLOR}\"}" > badges/coverage.json

      - name: Generate Doxygen docs
        run: doxygen Doxyfile

      - name: Assemble site
        run: |
          mkdir -p site
          cp -r docs/html site/html
          cp -r build/coverage site/coverage
          cp -r badges site/badges

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
